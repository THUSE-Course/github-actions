name: Reusable Docker Buildscript
on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      label:
        required: false
        default: "latest"
        type: string
      path:
        required: false
        default: "./"
        type: string
      owner:
        required: true
        type: string
      push:
        required: false
        default: true
        type: boolean
      registry:
        required: false
        default: "ghcr.io"
        type: string
      rotate:
        required: false
        default: true
        type: boolean
concurrency:
  group: docker-${{ inputs.owner }}-${{ inputs.name }}
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up docker buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Log into GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ inputs.registry }}/${{ inputs.owner }}/${{ inputs.name }}
          tags: |
            type=raw,value=${{ inputs.label }}
            type=raw,value=latest
      - name: Build and push amd64 image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ inputs.path }}
          file: ${{ inputs.path }}/Dockerfile
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
      - name: Delete old images
        if: ${{ inputs.push && inputs.rotate }}
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          keep-n-untagged: 1
          keep-n-tagged: 2
          exclude-tags: latest
          package: ${{ inputs.name }}
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
